name: Stock Monitor

on:
  schedule:
    # 每天的交易时间运行 (北京时间 9:30-15:00)
    # GitHub Action 使用 UTC 时间，比北京时间慢 8 小时
    # 比如 01:30 UTC 对应北京时间 09:30
    - cron: '30 1-7 * * 1-5' 
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install akshare pandas requests

      - name: Run script
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python main.py
